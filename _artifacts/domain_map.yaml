library:
  name: '@proofkit'
  version: 'monorepo (see individual packages)'
  repository: 'https://github.com/proofsh/proofkit'
  description: 'TypeScript tools and libraries for building web applications integrated with Claris FileMaker'
  primary_framework: 'framework-agnostic'

domains:
  - name: 'Connecting to FileMaker'
    slug: 'connecting'
    description: 'Setting up typed connections to FileMaker via Data API or OData, including authentication, adapters, and type generation'

  - name: 'Reading and Writing Data'
