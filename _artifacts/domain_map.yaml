  - name: 'OData Query Optimization'
    slug: 'odata-query-optimization'
    domain: 'data-access'
    description: 'Performance patterns for fmodata queries including selective fetching, pagination, batch operations, and entity IDs'
    type: core
    packages:
      - '@proofkit/fmodata'
    covers:
      - 'defaultSelect "schema" vs "all" performance'
      - 'Pagination with top/skip'
      - 'Default 1000 record limit'
      - 'Batch operations for multiple requests'
      - 'Entity IDs for rename resilience'
      - 'select() for minimal field fetching'
      - 'count() for record counting without data transfer'
      - 'getQueryString() for debugging'
      - 'includeSpecialColumns limitations'
    tasks:
      - 'Optimize query to fetch only needed fields'
      - 'Paginate through large result sets efficiently'
      - 'Use batch operations to reduce round trips'
      - 'Configure entity IDs for production resilience'
      - 'Debug slow queries with getQueryString()'
    failure_modes:
      - mistake: 'Not understanding default 1000 record limit'
        mechanism: 'list() applies top(1000) by default to prevent stack overflow. Developers may not realize they are getting truncated results.'
        wrong_pattern: |
          // Assumes this returns ALL records
          const result = await db.from(contacts).list().execute();
          // Actually returns max 1000
        correct_pattern: |
          // Explicitly paginate or use count() to know total
          const count = await db.from(contacts).list().count().execute();
          // Then paginate with top/skip
          const page1 = await db.from(contacts).list().top(100).skip(0).execute();
          const page2 = await db.from(contacts).list().top(100).skip(100).execute();
        source: 'source: query-builder.ts:48-50, entity-set.ts:183-185'
        priority: HIGH
        status: active

      - mistake: 'includeSpecialColumns with explicit select()'
        mechanism: 'OData spec limitation: ROWID/ROWMODID special columns are only included when no $select is applied. Using select() and includeSpecialColumns together silently drops special columns.'
        wrong_pattern: |
          const result = await db.from(contacts)
            .list()
            .select({ name: contacts.name })
            .execute({ includeSpecialColumns: true });
          // ROWID/ROWMODID will NOT be included
        correct_pattern: |
          // Either use select() OR includeSpecialColumns, not both
          const result = await db.from(contacts)
            .list()
            .execute({ includeSpecialColumns: true });
          // Or explicitly include ROWID in your schema
        source: 'docs: fmodata/extra-properties.mdx'
        priority: MEDIUM
        status: active

      - mistake: 'Entity IDs on tables without configured IDs'
        mechanism: 'Setting useEntityIds: true on a table/request where entity IDs are not configured throws immediately.'
        wrong_pattern: |
          const contacts = fmTableOccurrence("Contacts", { name: textField() });
          // No entityId on table or fields
          db.from(contacts).list().execute({ useEntityIds: true }); // throws
        correct_pattern: |
          const contacts = fmTableOccurrence("Contacts", {
            name: textField().entityId("FMFID:123"),
          }, { entityId: "FMTID:456" });
          db.from(contacts).list().execute({ useEntityIds: true });
        source: 'source: table-utils.ts:27, insert-builder.ts:124-125'
        priority: MEDIUM
        status: active

      - mistake: 'Filtering on null fields causes severe performance degradation'
        mechanism: 'OData queries filtering for null values (eq null, ne null) are extremely slow on FileMaker Server. Use a calculated number field (0/1) in FM instead and filter on that.'
        wrong_pattern: |
          // Very slow on FM Server OData
          db.from(contacts).list().where(isNull(contacts.email)).execute();
          db.from(contacts).list().where(isNotNull(contacts.email)).execute();
        correct_pattern: |
          // In FileMaker: create calc field "HasEmail" = If(IsEmpty(Email); 0; 1)
          // In schema: hasEmail: numberField()
          db.from(contacts).list().where(eq(contacts.hasEmail, 1)).execute();
        source: 'maintainer interview'
        priority: HIGH
        status: active

      - mistake: 'Overwhelming OData service during testing'
        mechanism: 'AI agents running performance tests or rapid sequential queries can overwhelm the FileMaker OData service, causing skewed results or service degradation. The OData service can be restarted via OttoFMS API if installed.'
        correct_pattern: |
          // Space out test queries, use small datasets
          // If OData service becomes unresponsive:
          // 1. Ask user to restart OData service via OttoFMS admin
          // 2. Or programmatically via OttoFMS API (with caution)
          // See: https://docs.ottomatic.cloud/docs/ottofms-api/introduction
        source: 'maintainer interview'
        priority: HIGH
        status: active

      - mistake: 'Not testing relationship query performance'
        mechanism: 'Queries using navigate() or expand() for related records are sometimes slow and sometimes fine on FM Server. Performance is unpredictable and must be tested case-by-case, not assumed to be fast.'
        correct_pattern: |
          // Always test relationship queries with representative data volumes
          // Use getQueryString() to inspect the generated OData URL
          const query = db.from(contacts).list().expand(invoices);
          console.log(query.getQueryString()); // debug first
          const result = await query.execute(); // then test performance
        source: 'maintainer interview'
        priority: MEDIUM
        status: active

tensions:
  - name: 'Type safety vs rapid prototyping'
    skills: ['typegen-setup', 'fmdapi-client', 'fmodata-client']
    description: 'Typegen provides strong type safety but requires running codegen after every FM schema change. Rapid prototyping is slowed by the generate-check-fix cycle.'
    implication: 'An agent optimizing for speed might skip typegen and manually define types, losing validation and creating drift between FM schema and TypeScript types.'

  - name: 'defaultSelect schema safety vs completeness'
    skills: ['fmodata-client', 'odata-query-optimization']
    description: 'defaultSelect "schema" is performant and safe but only returns fields defined in the TypeScript schema. "all" returns everything but is slower and types are less precise.'
    implication: 'An agent might switch to "all" to fix missing data issues without understanding the performance cost, or stick with "schema" without realizing fields are being excluded.'

  - name: 'WebViewer local mode vs server-based data access'
    skills: ['webviewer-integration', 'fmdapi-client', 'fmodata-client']
    description: 'WebViewer local mode (WebViewerAdapter) requires no auth and works offline, but uses single-threaded FM script execution — concurrent queries cause beach balls. Server-based OData is fast and concurrent but requires authentication and FM server connectivity. This is a core architecture decision.'
    implication: 'An agent might use listAll or TanStack Query with retries in WebViewer local mode, overwhelming the single-threaded FM script engine. Or it might try server patterns inside WebViewer without considering auth requirements.'

