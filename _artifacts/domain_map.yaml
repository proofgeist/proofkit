skills:
  - name: 'Typegen Setup'
    slug: 'typegen-setup'
    domain: 'connecting'
    description: 'Configure and run @proofkit/typegen to generate TypeScript types and runtime validators from FileMaker layouts or OData metadata'
    type: core
    packages:
      - '@proofkit/typegen'
      - '@proofkit/fmdapi'
      - '@proofkit/fmodata'
    covers:
      - 'proofkit-typegen-config.jsonc'
      - 'npx @proofkit/typegen CLI'
      - 'Data API config (type: fmdapi)'
      - 'OData config (type: fmodata)'
      - 'validator option (zod/v4, zod/v3, false)'
      - 'Generated file structure (client/, generated/, schema/)'
      - 'Override files vs generated files'
      - 'Environment variables (FM_SERVER, FM_DATABASE, OTTO_API_KEY, FM_USERNAME, FM_PASSWORD)'
      - 'strictNumbers, strictValueLists options'
      - 'webviewerScriptName option'
      - 'fmMcp config (local FM MCP proxy for typegen metadata fetching)'
      - 'FM MCP env vars (FM_HTTP_BASE_URL, FM_CONNECTED_FILE_NAME)'
      - 'FM MCP auto-discovery of connectedFileName via /connectedFiles'
      - 'Field type overrides for OData'
      - 'reduceMetadata, alwaysOverrideFieldNames'
      - 'Entity ID preservation across regeneration'
    tasks:
      - 'Initialize typegen config for a new project'
      - 'Add a new layout/table to an existing config'
      - 'Regenerate types after FileMaker schema changes'
      - 'Switch from Data API to OData config'
      - 'Configure environment variables for FM connection'
      - 'Set up FM MCP mode for local typegen without credentials'
      - 'Troubleshoot FM MCP connectivity issues'
      - 'Customize generated schemas with override files'
    failure_modes:
      - mistake: 'Editing files in generated/ or client/ directories'
        mechanism: 'Typegen overwrites these directories on every run. User customizations are lost.'
        wrong_pattern: |
          // Editing schema/generated/Contacts.ts directly
          export const ZContacts = z.object({
            name: z.string(),
            customField: z.string(), // added manually
          });
        correct_pattern: |
          // Edit schema/Contacts.ts (the override file) instead
          // schema/generated/Contacts.ts is always overwritten
          // schema/Contacts.ts is only created if missing
        source: 'docs: typegen/index.mdx, typegen/customization.mdx'
        priority: CRITICAL
        status: active

      - mistake: 'Using old config file format from @proofgeist/fmdapi'
        mechanism: 'Config migrated from fmschema.config.mjs to proofkit-typegen-config.jsonc. Old format triggers exit with upgrade message.'
        wrong_pattern: |
          // fmschema.config.mjs (old format)
          export default { schemas: [{ layout: "Contacts" }] }
        correct_pattern: |
          // proofkit-typegen-config.jsonc (new format)
          { "config": { "type": "fmdapi", "layouts": [{ "layoutName": "Contacts", "schemaName": "contacts" }] } }
        source: 'source: cli.ts:42-53, docs: fmdapi/version-5.mdx'
        priority: HIGH
        status: active

      - mistake: 'Putting env var values instead of names in config'
        mechanism: 'Config envNames field expects variable NAMES (e.g. "MY_API_KEY"), not the actual secret values. Secrets would be committed to version control.'
        wrong_pattern: |
          { "envNames": { "auth": { "apiKey": "dk_abc123secret" } } }
        correct_pattern: |
          { "envNames": { "auth": { "apiKey": "MY_OTTO_KEY" } } }
        source: 'docs: typegen/config.mdx'
        priority: CRITICAL
        status: active

      - mistake: 'Not running typegen after FileMaker schema changes'
        mechanism: 'Field additions/renames/deletions in FM are not reflected in TypeScript until typegen is re-run. Results in runtime validation errors or missing fields.'
        wrong_pattern: |
          // FileMaker field renamed from "Name" to "FullName"
          // but typegen not re-run, so code still references old field
          const result = await ContactsLayout.find({ query: { Name: "==John" } });
        correct_pattern: |
          // Run: npx @proofkit/typegen
          // Then: tsc (to find broken field references)
          const result = await ContactsLayout.find({ query: { FullName: "==John" } });
        source: 'docs: cli/guides/typegen.mdx'
        priority: HIGH
        status: active

      - mistake: 'Omitting type discriminator for OData config'
        mechanism: 'Config is a discriminated union on type field. OData config requires type: "fmodata" explicitly. Default is "fmdapi".'
        wrong_pattern: |
          { "config": { "tables": [{ "tableName": "Contacts" }] } }
        correct_pattern: |
          { "config": { "type": "fmodata", "tables": [{ "tableName": "Contacts" }] } }
        source: 'source: types.ts discriminated union, docs: typegen/config-odata.mdx'
        priority: HIGH
        status: active

      - mistake: 'Manually redefining TypeScript types instead of using generated/inferred types'
        mechanism: 'Agents create manual interface/type definitions for FM data instead of using typegen-generated schemas and type inference helpers (InferTableSchema for fmodata, InferZodPortals for fmdapi). Manual types drift from FM schema on any field change and bypass runtime validation.'
        wrong_pattern: |
          // Agent manually defines types
          interface Contact {
            Name: string;
            Email: string;
            Phone: string;
          }
          // These types will drift when FM fields change
          const result = await db.from(contacts).list().execute();
          const data = result.data as Contact[];
        correct_pattern: |
          // Use typegen-generated schemas + type inference
          // For fmodata:
          import { type InferTableSchema } from "@proofkit/fmodata";
          import { contacts } from "./schema";
          type Contact = InferTableSchema<typeof contacts>;

          // For fmdapi: types are generated by typegen
          // Import from schema/generated, never redefine
          import { type TContacts } from "./schema/generated/contacts";
        source: 'maintainer interview'
        priority: CRITICAL
        status: active
        skills: ['typegen-setup', 'fmdapi-client', 'fmodata-client']

      - mistake: 'Mixing Zod v3 and v4 in the same project'
        mechanism: 'ProofKit supports both zod/v3 and zod/v4 via the typegen validator option, but the entire app must use one version consistently. Mixing v3 and v4 imports causes opaque TypeScript type errors that are hard to diagnose. The typegen config validator setting must match the Zod version installed in the project.'
        wrong_pattern: |
          // typegen config set to "zod/v4"
          // but app code imports from zod v3 path
          import { z } from "zod"; // v3 installed
          // Generated schemas use zod/v4 imports — type mismatch
        correct_pattern: |
          // Ensure consistency:
          // 1. typegen config: "validator": "zod/v4"
          // 2. package.json: "zod": "^4.x"
          // 3. All app imports: import { z } from "zod/v4" or "zod"
          // If upgrading from v3: change validator in config AND update zod dependency
        source: 'maintainer interview'
        priority: HIGH
        status: active
        skills: ['typegen-setup', 'fmdapi-client', 'fmodata-client']

      - mistake: 'Using FmMcpAdapter in production application code'
        mechanism: 'FmMcpAdapter is internal to typegen metadata fetching. Generated clients use WebViewerAdapter. Agent sees the adapter import in typegen source and uses it in app code.'
        wrong_pattern: |
          import { FmMcpAdapter } from "@proofkit/fmdapi/adapters/fm-mcp";
          const client = DataApi({
            adapter: new FmMcpAdapter({ baseUrl: "http://127.0.0.1:1365", connectedFileName: "MyFile" }),
            layout: "Contacts",
          });
        correct_pattern: |
          // Use typegen-generated client (which uses WebViewerAdapter internally)
          import { ContactsLayout } from "./schema/client";
          const { data } = await ContactsLayout.find({ query: { name: "==John" } });
        source: 'source: typegen.ts, buildLayoutClient.ts'
        priority: CRITICAL
        status: active
        skills: ['typegen-setup']

      - mistake: 'Setting standard FM env vars when using fmMcp mode'
        mechanism: 'fmMcp mode does not need FM_SERVER, FM_DATABASE, or OTTO_API_KEY. Agent configures both standard and fmMcp env vars, causing confusion when standard vars fail validation.'
        wrong_pattern: |
          # .env — agent sets both
          FM_SERVER=https://fm.example.com
          FM_DATABASE=MyFile.fmp12
          OTTO_API_KEY=dk_abc123
          FM_HTTP_BASE_URL=http://127.0.0.1:1365
        correct_pattern: |
          # fmMcp mode only needs these (baseUrl defaults to 127.0.0.1:1365)
          # connectedFileName is auto-discovered if not set
          FM_CONNECTED_FILE_NAME=MyFile
        source: 'source: getEnvValues.ts, constants.ts'
        priority: HIGH
        status: active
        skills: ['typegen-setup']

      - mistake: 'Suggesting OttoFMS/FetchAdapter fallback when FM MCP fails'
        mechanism: 'Agent troubleshoots FM MCP connection failure by suggesting standard auth. Developer chose fmMcp because they have no hosted credentials or are working offline. Correct troubleshooting: check daemon health (GET http://127.0.0.1:1365/health), check /connectedFiles, ensure FM file has run "Connect to MCP" script and WebViewer window is open in Browse mode.'
        source: 'maintainer interview'
        priority: HIGH
        status: active
        skills: ['typegen-setup']

      - mistake: 'FM MCP WebViewer window closed or in Layout mode'
        mechanism: 'The FM MCP proxy works via a WebViewer window opened by the "Connect to MCP" script in FileMaker. If this window is closed or switched to Layout mode, all proxy requests fail. Error may not be obvious — typegen just fails to connect.'
        correct_pattern: |
          # Troubleshooting checklist:
          # 1. Is the fm-mcp daemon running? GET http://127.0.0.1:1365/health
          # 2. Is the file connected? GET http://127.0.0.1:1365/connectedFiles
          # 3. If file not listed: open it in FileMaker, run "Connect to MCP" script
          # 4. Ensure the WebViewer window stays open in Browse mode (not Layout mode)
        source: 'maintainer interview'
        priority: HIGH
        status: active
        skills: ['typegen-setup']

  - name: 'Data API Client'
    slug: 'fmdapi-client'
    domain: 'data-access'
    description: 'Set up and use @proofkit/fmdapi to read and write FileMaker records via the Data API'
    type: core
    packages:
      - '@proofkit/fmdapi'
    covers:
      - 'DataApi() factory'
      - 'OttoAdapter (API key auth, recommended)'
      - 'FetchAdapter (username/password auth)'
      - 'Token stores (memory, file, upstash)'
      - 'CRUD: list, find, get, create, update, delete'
      - 'findOne, findFirst, maybeFindFirst, findAll, listAll'
      - 'executeScript, layoutMetadata, containerUpload'
      - 'Schema validation with Standard Schema (Zod)'
      - 'Portal data access'
      - 'Sort, offset, limit parameters'
      - 'FileMaker find operators (==, >, <, etc.)'
    tasks:
      - 'Create a typed Data API client for a layout'
      - 'Query records with find criteria'
      - 'Create, update, or delete records'
      - 'Paginate through large result sets'
      - 'Execute FileMaker scripts'
      - 'Upload files to container fields'
      - 'Configure token persistence for production'
    subsystems:
      - name: 'OttoAdapter'
        package: '@proofkit/fmdapi'
        config_surface: 'server, db, auth.apiKey (dk_ or KEY_ prefix), ottoPort'
      - name: 'FetchAdapter'
        package: '@proofkit/fmdapi'
        config_surface: 'server, db, auth.username/password, tokenStore'
    failure_modes:
      - mistake: 'Creating DataApi without an adapter wrapper'
        mechanism: 'v5 requires explicit FetchAdapter or OttoAdapter. Flat config pattern from older versions no longer works.'
        wrong_pattern: |
          const client = DataApi({
            server: "https://fm.example.com",
            db: "MyDB",
            auth: { apiKey: "dk_..." },
            layout: "Contacts",
          });
        correct_pattern: |
          import { DataApi, OttoAdapter } from "@proofkit/fmdapi";
          const client = DataApi({
            adapter: new OttoAdapter({
              server: "https://fm.example.com",
              db: "MyDB",
              auth: { apiKey: "dk_..." },
            }),
            layout: "Contacts",
          });
        source: 'docs: fmdapi/version-5.mdx, GitHub fmdapi issues'
        priority: CRITICAL
        status: active

      - mistake: 'Omitting token store in production (FetchAdapter)'
        mechanism: 'Default memoryStore loses tokens on restart. Each request creates a new FM session, exhausting the 500-session server limit.'
        wrong_pattern: |
          const adapter = new FetchAdapter({
            server: "https://fm.example.com",
            db: "MyDB",
            auth: { username: "admin", password: "pass" },
          });
        correct_pattern: |
          import { fileTokenStore } from "@proofkit/fmdapi/tokenStore/file";
          const adapter = new FetchAdapter({
            server: "https://fm.example.com",
            db: "MyDB",
            auth: { username: "admin", password: "pass" },
            tokenStore: fileTokenStore(),
          });
        source: 'GitHub fmdapi #18, docs: fmdapi/token-store.mdx'
        priority: CRITICAL
        status: active

      - mistake: 'Storing FM recordId as a persistent identifier'
        mechanism: 'FileMaker internal recordId can change during data migrations or imports. Always look up records by a stable field (e.g. primary key) instead.'
        wrong_pattern: |
          // Storing recordId in external database
          await externalDb.save({ fmRecordId: record.recordId });
          // Later: fails if FM data was migrated
          await ContactsLayout.update({ recordId: savedRecordId, fieldData: { ... } });
        correct_pattern: |
          // Store a stable primary key instead
          await externalDb.save({ contactId: record.fieldData.ContactID });
          // Look up by primary key, then use recordId for the update
          const found = await ContactsLayout.findOne({ query: { ContactID: "==abc123" } });
          await ContactsLayout.update({ recordId: found.recordId, fieldData: { ... } });
        source: 'docs: fmdapi/examples.mdx'
        priority: HIGH
        status: active

      - mistake: 'Assuming dynamic layout switching on a single client'
        mechanism: 'Each DataApi client is bound to one layout at construction. Different layouts need separate client instances (typically generated by typegen).'
        wrong_pattern: |
          const client = DataApi({ adapter, layout: "Contacts" });
          // Cannot switch to a different layout
          const invoices = await client.find({ layout: "Invoices", query: {} });
        correct_pattern: |
          // Use separate clients per layout (generated by typegen)
          import { ContactsLayout } from "./schema/client";
          import { InvoicesLayout } from "./schema/client";
          const contacts = await ContactsLayout.find({ query: {} });
          const invoices = await InvoicesLayout.find({ query: {} });
        source: 'GitHub fmdapi #99, docs: fmdapi/quick-start.mdx'
        priority: HIGH
        status: active

      - mistake: 'Using wrong Otto API key format'
        mechanism: 'OttoAdapter validates key prefix at construction. dk_ = OttoFMS, KEY_ = Otto v3. Other formats throw immediately.'
        wrong_pattern: |
          new OttoAdapter({ auth: { apiKey: "my-api-key" } })
        correct_pattern: |
          new OttoAdapter({ auth: { apiKey: "dk_abc123..." } })
        source: 'source: otto.ts:52'
        priority: MEDIUM
        status: active

      - mistake: 'Using deprecated zodValidators option instead of schema'
        mechanism: 'v5 replaced zodValidators with Standard Schema-based schema option. Runtime error thrown if zodValidators detected.'
        wrong_pattern: |
          DataApi({ adapter, layout: "Contacts", zodValidators: { fieldData: ZContact } })
        correct_pattern: |
          DataApi({ adapter, layout: "Contacts", schema: { fieldData: ZContact } })
        source: 'source: client.ts:82'
        priority: HIGH
        status: active

  - name: 'OData Client'
    slug: 'fmodata-client'
    domain: 'data-access'
    description: 'Set up and use @proofkit/fmodata to read and write FileMaker records via OData with a Drizzle-like ORM'
    type: core
    packages:
      - '@proofkit/fmodata'
    covers:
      - 'FMServerConnection'
      - 'fmTableOccurrence() schema definition'
      - 'Field builders (textField, numberField, dateField, etc.)'
      - 'Query builder: list, get, where, select, orderBy, top, skip, count'
      - 'Filter operators: eq, ne, gt, gte, lt, lte, contains, startsWith, endsWith, etc.'
      - 'String transforms: tolower, toupper, trim'
      - 'CRUD: insert, update (byId/where), delete (byId/where)'
      - 'Relationships: navigate(), expand()'
      - 'Batch operations'
      - 'Error handling with Result type (neverthrow)'
      - 'Entity IDs (FMFID/FMTID)'
      - 'Schema management (createTable, addFields, deleteTable)'
      - 'Script execution'
      - 'Webhooks'
      - 'defaultSelect behavior'
    tasks:
      - 'Define a table schema with field builders'
      - 'Query records with type-safe filters'
      - 'Insert, update, or delete records'
      - 'Navigate or expand related tables'
      - 'Execute batch operations'
      - 'Handle errors using Result pattern or type guards'
      - 'Run FileMaker scripts via OData'
      - 'Set up webhooks for change monitoring'
    reference_candidates:
      - topic: 'Filter operators'
        reason: '>15 distinct operators with different signatures and behaviors'
      - topic: 'Error types'
        reason: '>10 distinct error classes with different properties and type guards'
    failure_modes:
      - mistake: 'Forgetting to call .execute() on query builders'
        mechanism: 'Query builders are lazy. Without .execute(), no request is made. The builder object is returned, not the data.'
        wrong_pattern: |
          const records = db.from(contacts).list().where(eq(contacts.name, "John"));
          console.log(records.data); // undefined -- records is a QueryBuilder, not a Result
        correct_pattern: |
          const result = await db.from(contacts).list().where(eq(contacts.name, "John")).execute();
          if (result.error) { /* handle */ }
          console.log(result.data);
        source: 'docs: fmodata/queries.mdx'
        priority: CRITICAL
        status: active

      - mistake: 'Ignoring the Result error field'
        mechanism: 'fmodata returns { data, error } (neverthrow pattern). Data is null when error is present. Accessing data without checking error causes runtime crashes.'
        wrong_pattern: |
          const result = await db.from(contacts).list().execute();
          const first = result.data[0]; // TypeError if error occurred
        correct_pattern: |
          const result = await db.from(contacts).list().execute();
          if (result.error) {
            console.error(result.error.message);
            return;
          }
          const first = result.data[0];
        source: 'docs: fmodata/errors.mdx'
        priority: CRITICAL
        status: active

      - mistake: 'Using Drizzle ORM query patterns instead of fmodata patterns'
        mechanism: 'fmodata is Drizzle-inspired but has critical API differences. Agents trained on Drizzle will use wrong method names, wrong chaining order, and missing .execute(). Key differences: db.select().from() -> db.from().list(); .limit()/.offset() -> .top()/.skip(); like/ilike/between operators do not exist (use contains/startsWith/endsWith); Drizzle auto-executes but fmodata requires .execute(); Drizzle returns rows[] but fmodata returns { data, error }.'
        wrong_pattern: |
          // Drizzle patterns that DO NOT work in fmodata:
          import { eq, like, between } from "@proofkit/fmodata"; // like, between don't exist
          await db.select().from(contacts).where(eq(contacts.id, 42)); // wrong chain, no execute
          await db.select({ name: contacts.name }).from(contacts).limit(10).offset(10); // wrong methods
        correct_pattern: |
          import { eq, contains, startsWith, endsWith } from "@proofkit/fmodata";
          // fmodata: from() -> list/get -> where/select/top/skip -> execute()
          const result = await db.from(contacts).list().where(eq(contacts.id, "42")).execute();
          if (result.error) { /* handle error */ }
          const data = result.data;
          // Pagination uses OData naming
          await db.from(contacts).list().select({ name: contacts.name }).top(10).skip(10).execute();
          // Pattern matching: use contains/startsWith/endsWith, NOT like/ilike
          await db.from(contacts).list().where(contains(contacts.name, "John")).execute();
        source: 'maintainer interview, Drizzle ORM docs comparison'
        priority: CRITICAL
        status: active

      - mistake: 'Using raw SQL/JS operators instead of OData filter functions'
        mechanism: 'fmodata uses OData filter syntax, not SQL. Agents must use library filter operators (eq, contains, etc.), not JS comparisons or SQL WHERE syntax.'
        wrong_pattern: |
          // SQL-style (wrong)
          db.from(contacts).list().where("name LIKE '%John%'")
          // JS comparison (wrong)
          db.from(contacts).list().where(contacts.name === "John")
        correct_pattern: |
          import { eq, contains } from "@proofkit/fmodata";
          db.from(contacts).list().where(eq(contacts.name, "John")).execute();
          db.from(contacts).list().where(contains(contacts.name, "John")).execute();
        source: 'docs: fmodata/queries.mdx'
        priority: CRITICAL
        status: active

      - mistake: 'Container fields in select() calls'
        mechanism: 'Container fields cannot be included in OData $select. They must be accessed individually via .getSingleField().'
        wrong_pattern: |
          db.from(contacts).list().select({ photo: contacts.photo }).execute();
        correct_pattern: |
          db.from(contacts).get("id").getSingleField(contacts.photo).execute();
        source: 'source: field-builders.ts:430, table.ts:226'
        priority: HIGH
        status: active

      - mistake: 'Expecting batch operations to continue after first error'
        mechanism: 'FileMaker stops processing batch on first error. Remaining operations get BatchTruncatedError with status 0.'
        wrong_pattern: |
          // Assuming all 5 inserts run independently
          const result = await db.batch([insert1, insert2, insert3, insert4, insert5]).execute();
          // If insert2 fails, insert3-5 are truncated, not executed
        correct_pattern: |
          const result = await db.batch([insert1, insert2, insert3]).execute();
          if (result.summary.errorCount > 0) {
            // Check which operation failed and which were truncated
            for (const item of result.items) {
              if (item.error?.kind === "BatchTruncatedError") {
                // This operation was never executed
              }
            }
          }
        source: 'docs: fmodata/batch.mdx'
        priority: HIGH
        status: active

      - mistake: 'Script names with special characters via OData'
        mechanism: 'OData does not support script names containing @, &, / or names starting with a number.'
        wrong_pattern: |
          db.runScript("@OnLoad/Init");
        correct_pattern: |
          db.runScript("OnLoadInit");
          // Rename the FM script to avoid special characters
        source: 'docs: fmodata/scripts.mdx'
        priority: MEDIUM
        status: active

      - mistake: 'Using defaultSelect "all" without understanding performance impact'
        mechanism: 'defaultSelect "schema" (default) only requests fields defined in your schema. "all" fetches every field from FM, including large text/calc fields you may not need.'
        wrong_pattern: |
          const contacts = fmTableOccurrence("Contacts", { id: textField() }, { defaultSelect: "all" });
          // Fetches ALL fields from FM even though schema only defines id
        correct_pattern: |
          const contacts = fmTableOccurrence("Contacts", { id: textField(), name: textField() });
          // defaultSelect: "schema" (default) -- only fetches id and name
        source: 'docs: fmodata/schema.mdx'
        priority: MEDIUM
        status: active

  - name: 'WebViewer Integration'
    slug: 'webviewer-integration'
    domain: 'webviewer'
    description: 'Use @proofkit/webviewer to call FileMaker scripts and access Data API from JavaScript running inside a FileMaker WebViewer'
    type: core
    packages:
      - '@proofkit/webviewer'
      - '@proofkit/fmdapi'
    covers:
      - 'fmFetch() -- call FM script and await result'
      - 'callFMScript() -- fire-and-forget script call'
      - 'FMScriptOption enum'
      - 'WebViewerAdapter for fmdapi integration'
      - 'globalSettings.setWebViewerName()'
      - 'SendCallback mechanism'
      - 'Browser-only runtime constraint'
    tasks:
      - 'Call a FileMaker script from JavaScript and get a result back'
      - 'Use fmdapi Data API client inside a WebViewer'
      - 'Debug WebViewer script communication issues'
      - 'Deploy WebViewer code (embedded, hosted, downloaded)'
    failure_modes:
      - mistake: 'Importing @proofkit/webviewer in server-side code'
        mechanism: 'The package requires window.FileMaker which only exists inside FM WebViewer. Importing in Node/SSR throws or silently breaks.'
        wrong_pattern: |
          // In a Next.js API route or server component
          import { fmFetch } from "@proofkit/webviewer";
        correct_pattern: |
          // Only import in client-side code that runs inside FM WebViewer
          // Use "use client" directive in React, or ensure the code only runs in browser
          "use client";
          import { fmFetch } from "@proofkit/webviewer";
        source: 'source: main.ts:111 (throws if window.FileMaker unavailable), docs: webviewer/index.mdx'
        priority: CRITICAL
        status: active

      - mistake: 'fmFetch promise never resolves'
        mechanism: 'FM script must call SendCallback with matching webViewerName and fetchId. Wrong webviewer name, missing callback, or leaving the layout causes the promise to hang forever.'
        wrong_pattern: |
          // FM script does not call SendCallback
          // or calls it with wrong webViewer name
          const result = await fmFetch("MyScript", { id: 1 }); // hangs
        correct_pattern: |
          // Ensure FM script parses $json for "callback" key
          // and calls SendCallback with the callback.fn, callback.fetchId, and callback.webViewerName
          globalSettings.setWebViewerName("MyWebViewer");
          const result = await fmFetch("MyScript", { id: 1 });
        source: 'docs: webviewer/troubleshooting.mdx, webviewer/fmFetch.mdx'
        priority: CRITICAL
        status: active

      - mistake: 'Calling FM scripts before window.FileMaker is available'
        mechanism: 'FileMaker injects the JS bridge after page load. Calling fmFetch/callFMScript too early throws "window.FileMaker was not available".'
        wrong_pattern: |
          // At module top level or in immediate script execution
          const result = await fmFetch("MyScript");
        correct_pattern: |
          // Wait for FM bridge to be ready
          window.addEventListener("load", async () => {
            const result = await fmFetch("MyScript");
          });
        source: 'docs: webviewer/troubleshooting.mdx'
        priority: HIGH
        status: active

      - mistake: 'Using executeScript or containerUpload via WebViewerAdapter'
        mechanism: 'WebViewerAdapter explicitly throws for executeScript and containerUpload. These are not supported in WebViewer context.'
        wrong_pattern: |
          const client = DataApi({ adapter: new WebViewerAdapter({ scriptName: "DAPI" }), layout: "Contacts" });
          await client.executeScript("MyScript"); // throws
        correct_pattern: |
          // Use callFMScript or fmFetch for script execution in WebViewer
          import { callFMScript } from "@proofkit/webviewer";
          callFMScript("MyScript", { param: "value" });
        source: 'source: adapter.ts:133-141'
        priority: HIGH
        status: active

      - mistake: 'Not understanding single-threaded script execution in WebViewer local mode'
        mechanism: 'WebViewerAdapter sends queries via FM client script execution which is single-threaded. Rapid concurrent queries (e.g. TanStack Query retries, listAll auto-pagination) cause queuing and beach balls for the user. This is especially problematic when scripts take time to run. Consider server-based OData approach for heavy queries, but note that introduces authentication requirements not normally needed for WebViewer.'
        correct_pattern: |
          // Avoid firing many concurrent queries in WebViewer local mode
          // Bad: multiple parallel queries or TanStack Query with aggressive retries
          // Good: sequential queries, debounced fetching, or server-based OData for heavy workloads
          // If diagnosing slow WebViewer: check if queries are queuing up in FM script engine
          // Architecture decision: local WebViewerAdapter (simple, no auth, single-threaded)
          //   vs server OData (fast, concurrent, but requires auth + FM server connection)
        source: 'maintainer interview'
        priority: HIGH
        status: active

      - mistake: 'Accessing window.FileMaker directly instead of using library functions'
        mechanism: 'Agents bypass @proofkit/webviewer and access window.FileMaker directly — calling PerformScript, checking if (window.FileMaker), or wrapping calls in typeof guards. All of this is unnecessary when using the webviewer package, which handles the FM bridge internally. The library provides callFMScript (fire-and-forget) and fmFetch (with response) which handle parameter serialization, callbacks, and error cases.'
        wrong_pattern: |
          // Any direct access to window.FileMaker is wrong when using the package
          if (window.FileMaker) {
            window.FileMaker.PerformScript("Save Quote", JSON.stringify(payload));
          } else {
            console.log("FileMaker payload:", JSON.stringify(payload));
          }
        correct_pattern: |
          import { callFMScript, fmFetch } from "@proofkit/webviewer";
          // Fire-and-forget:
          callFMScript("Save Quote", payload);
          // With response:
          const result = await fmFetch("Save Quote", payload);
          // No need to check window.FileMaker — the library handles it
        source: 'maintainer interview'
        priority: CRITICAL
        status: active

  - name: 'Better Auth Setup'
    slug: 'better-auth-setup'
    domain: 'auth'
    description: 'Set up self-hosted authentication using Better Auth with FileMaker as the database backend via @proofkit/better-auth'
    type: core
    packages:
      - '@proofkit/better-auth'
      - '@proofkit/fmodata'
    covers:
      - 'FileMakerAdapter for Better Auth'
      - 'Migration CLI (npx @proofkit/better-auth migrate)'
      - 'FMServerConnection + Database setup for auth'
      - 'Schema migration (createTable, addFields)'
      - 'OData prerequisites (fmodata privilege)'
    tasks:
      - 'Install and configure Better Auth with FM backend'
      - 'Run database migrations to create auth tables'
      - 'Add Better Auth plugins and re-run migrations'
      - 'Troubleshoot migration privilege errors'
    failure_modes:
      - mistake: 'Using better-auth CLI directly instead of @proofkit/better-auth'
        mechanism: 'The standard better-auth CLI does not know about FileMaker. Running it produces "filemaker is not supported" error.'
        wrong_pattern: |
          npx better-auth migrate
        correct_pattern: |
          npx @proofkit/better-auth migrate
        source: 'docs: better-auth/troubleshooting.mdx'
        priority: CRITICAL
        status: active

      - mistake: 'Missing Full Access credentials for schema migration'
        mechanism: 'Creating tables/fields requires Full Access privileges. Standard API accounts lack this. CLI provides --username/--password override.'
        wrong_pattern: |
          npx @proofkit/better-auth migrate
          # Error 207: no schema modification privileges
        correct_pattern: |
          npx @proofkit/better-auth migrate --username admin --password fullAccessPass
        source: 'source: migrate.ts:209-219, docs: better-auth/installation.mdx'
        priority: HIGH
        status: active

      - mistake: 'Removing fields added by migration'
        mechanism: 'Better Auth expects certain fields to exist. Removing unused fields from FM may cause auth operations to fail silently.'
        wrong_pattern: |
          # In FileMaker: delete "emailVerified" field from users table
          # because your app doesn't use email verification
        correct_pattern: |
          # Keep all fields created by migration, even if unused
          # Better Auth may reference them internally
        source: 'docs: better-auth/installation.mdx'
        priority: HIGH
        status: active

      - mistake: 'Forgetting to re-run migration after adding plugins'
        mechanism: 'Better Auth plugins add new tables/fields. Without re-running migration, the FM schema is missing required structures.'
        wrong_pattern: |
          // Added twoFactor plugin to auth config
          // but did not run: npx @proofkit/better-auth migrate
        correct_pattern: |
          // After adding any Better Auth plugin:
          npx @proofkit/better-auth migrate
        source: 'docs: better-auth/installation.mdx'
        priority: HIGH
        status: active

